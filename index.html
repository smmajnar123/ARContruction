<!DOCTYPE html>
<html>
<head>
    <title>Construction Website</title>

    <style>
        body { margin: 0; font-family: Arial; }

        header {
            background: #1e3a5f;
            color: white;
            text-align: center;
            padding: 15px;
        }

        nav {
            display: flex;
            justify-content: center;
            background: #2c5282;
        }

        nav a {
            color: white;
            padding: 12px 20px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover { background: #1e3a5f; }

        section { display: none; padding: 30px; }
        .active { display: block; }

        /* HERO */
        .hero {
            background: url('https://source.unsplash.com/1600x500/?construction,building') no-repeat center/cover;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .hero h1 {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }

        /* SERVICES */
        .services {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 250px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .card h3, .card p {
            padding: 10px;
        }

        .about, .contact { background: #f4f6f8; }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            background: #1e3a5f;
            color: white;
            border: none;
            width: 100%;
        }

        footer {
            background: #1e3a5f;
            color: white;
            text-align: center;
            padding: 10px;
        }

        @media (max-width: 768px) {
            .hero { height: 200px; }
        }
    </style>

    <script>
        function showSection(id) {
            document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
            document.getElementById(id).classList.add("active");
        }

        window.onload = () => showSection('home');
    </script>
</head>

<body>

<header>
    <h2>🏗️ Construction Company</h2>
</header>

<nav>
    <a onclick="showSection('home')">Home</a>
    <a onclick="showSection('about')">About</a>
    <a onclick="showSection('contact')">Contact</a>
</nav>

<!-- HOME -->
<section id="home">

    <!-- HERO -->
    <div class="hero">
        <h1>Building the Future</h1>
    </div>

    <!-- SERVICES -->
    <div class="services">

        <div class="card">
            <img src="https://source.unsplash.com/400x300/?construction,site">
            <h3>Blasting Work</h3>
            <p>Safe blasting operations.</p>
        </div>

        <div class="card">
            <img src="https://source.unsplash.com/400x300/?cement,materials">
            <h3>Material Supply</h3>
            <p>Top quality materials.</p>
        </div>

        <div class="card">
            <img src="https://source.unsplash.com/400x300/?engineering,project">
            <h3>Project Management</h3>
            <p>Smart execution planning.</p>
        </div>

    </div>

</section>

<!-- ABOUT -->
<section id="about" class="about">
    <h2>About Us</h2>
    <p>We specialize in construction and blasting projects.</p>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
    <h2>Contact</h2>

    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button>Send</button>
</section>

<footer>
    © 2026 Construction Company
</footer>

</body>
</html>
